<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NCF Core Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500&display=swap');
        body { font-family: 'Inter', system-ui, sans-serif; background-color: #fafafa; color: #1a1a1a; }
        .font-mono { font-family: 'JetBrains Mono', monospace; }
        .score-bar { transition: width 0.7s cubic-bezier(0.22, 1, 0.36, 1); }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.7); }
            70% { transform: scale(1); box-shadow: 0 0 0 4px rgba(34, 197, 94, 0); }
            100% { transform: scale(0.8); box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); }
        }
        .status-dot { animation: pulse-ring 2s infinite; }
        input:focus, select:focus { outline: none; border-color: #000; box-shadow: none; }
    </style>
</head>
<body class="antialiased min-h-screen flex flex-col">

    <header class="sticky top-0 z-50 bg-white border-b border-gray-200 px-6 py-3 flex justify-between items-center shadow-sm">
        <div class="font-semibold tracking-tight text-lg">NCF Core Engine</div>
        <div class="flex items-center gap-4 text-sm">
            <span class="font-mono bg-gray-100 text-gray-500 px-2 py-0.5 rounded text-xs">v1.0.0</span>
            <div class="flex items-center gap-1.5 text-gray-600">
                <div id="status-indicator" class="w-2 h-2 rounded-full bg-green-500 status-dot"></div>
                <span id="status-text" class="text-xs font-semibold tracking-wider">ONLINE</span>
            </div>
        </div>
    </header>

    <main class="flex-grow max-w-3xl w-full mx-auto p-6 mt-4">
        <section class="bg-white border border-gray-200 p-5 mb-6 shadow-sm">
            <form id="query-form" class="grid grid-cols-1 md:grid-cols-12 gap-4 items-end">
                <div class="md:col-span-5">
                    <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-2">USER ID</label>
                    <input type="number" id="user-id" required min="0" placeholder="e.g., 42" class="w-full bg-gray-50 border border-gray-200 text-sm px-3 py-2 transition-colors placeholder-gray-400">
                </div>
                <div class="md:col-span-4">
                    <label class="block text-xs font-semibold text-gray-500 tracking-wide mb-2">TOP K</label>
                    <div class="relative">
                        <select id="top-k" class="w-full appearance-none bg-gray-50 border border-gray-200 text-sm px-3 py-2 pr-8 transition-colors">
                            <option value="5">5 Products</option>
                            <option value="10" selected>10 Products</option>
                            <option value="20">20 Products</option>
                        </select>
                        <div class="pointer-events-none absolute inset-y-0 right-0 flex items-center px-2 text-gray-400">
                            <svg class="fill-current h-4 w-4" viewBox="0 0 20 20"><path d="M9.293 12.95l.707.707L15.657 8l-1.414-1.414L10 10.828 5.757 6.586 4.343 8z"/></svg>
                        </div>
                    </div>
                </div>
                <div class="md:col-span-3">
                    <button type="submit" id="submit-btn" class="w-full bg-[#1a1a1a] hover:bg-black text-white text-sm font-semibold py-2 px-4 transition-colors">
                        Execute
                    </button>
                </div>
            </form>
        </section>

        <section class="bg-white border border-gray-200 shadow-sm overflow-hidden">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-gray-50 border-b border-gray-200 text-xs font-semibold text-gray-500 tracking-wider">
                        <th class="py-3 px-5 w-16 text-center">#</th>
                        <th class="py-3 px-5">PRODUCT ID</th>
                        <th class="py-3 px-5 text-right w-40">MATCH SCORE</th>
                    </tr>
                </thead>
                <tbody id="results-body" class="text-sm divide-y divide-gray-100">
                    <tr>
                        <td colspan="3" class="py-10 text-center text-gray-400 text-sm">Awaiting execution...</td>
                    </tr>
                </tbody>
            </table>
        </section>
    </main>

    <footer class="bg-white border-t border-gray-200 py-3 px-6 flex justify-between items-center text-xs text-gray-500 font-mono">
        <div>Amazon Office Products Dataset</div>
        <div>Request Latency: <span id="latency-display" class="font-semibold text-gray-800">-- ms</span></div>
    </footer>

    <script>
        const API_BASE = 'http://localhost:8000';
        const form = document.getElementById('query-form');
        const btn = document.getElementById('submit-btn');
        const tbody = document.getElementById('results-body');
        const latencySpan = document.getElementById('latency-display');
        const statusInd = document.getElementById('status-indicator');
        const statusText = document.getElementById('status-text');

        async function pingSystem() {
            try {
                const res = await fetch(`${API_BASE}/health`);
                if (res.ok) {
                    statusInd.className = 'w-2 h-2 rounded-full bg-green-500 status-dot';
                    statusText.textContent = 'ONLINE';
                } else throw new Error();
            } catch {
                statusInd.className = 'w-2 h-2 rounded-full bg-red-500';
                statusText.textContent = 'OFFLINE';
            }
        }

        setInterval(pingSystem, 30000);
        pingSystem();

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const userId = document.getElementById('user-id').value;
            const topK = document.getElementById('top-k').value;

            btn.disabled = true;
            btn.textContent = 'Processing...';
            tbody.innerHTML = `<tr><td colspan="3" class="py-10 text-center text-gray-400 text-sm">Evaluating user-item affinities...</td></tr>`;

            const start = performance.now();

            try {
                const res = await fetch(`${API_BASE}/predict`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_id: parseInt(userId), top_k: parseInt(topK) })
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Inference failed');
                }

                const data = await res.json();
                const latency = (performance.now() - start).toFixed(1);
                latencySpan.textContent = `${latency} ms`;

                if (!data.recommendations.length) {
                    tbody.innerHTML = `<tr><td colspan="3" class="py-10 text-center text-gray-400">No products found</td></tr>`;
                    return;
                }

                const maxScore = data.recommendations[0]?.score || 1;
                
                tbody.innerHTML = data.recommendations.map((item, idx) => {
                    const rank = (idx + 1).toString().padStart(2, '0');
                    const width = Math.max((item.score / maxScore) * 100, 1);
                    const barColor = idx < 3 ? 'bg-[#1a1a1a]' : 'bg-gray-300';
                    
                    return `
                        <tr class="hover:bg-gray-50 transition-colors">
                            <td class="py-3 px-5 text-center font-mono text-gray-400">${rank}</td>
                            <td class="py-3 px-5 font-mono font-medium text-gray-800">ITEM-${item.item_id}</td>
                            <td class="py-3 px-5 text-right font-mono relative">
                                <span class="relative z-10 text-gray-800">${item.score.toFixed(4)}</span>
                                <div class="absolute bottom-1 right-5 h-[2px] ${barColor} score-bar" style="width: 0%;" data-target="${width}%"></div>
                            </td>
                        </tr>
                    `;
                }).join('');

                requestAnimationFrame(() => {
                    setTimeout(() => {
                        document.querySelectorAll('.score-bar').forEach(bar => {
                            bar.style.width = bar.dataset.target;
                        });
                    }, 50);
                });

            } catch (err) {
                latencySpan.textContent = 'ERR';
                tbody.innerHTML = `<tr><td colspan="3" class="py-10 text-center text-red-500 font-mono text-sm">${err.message}</td></tr>`;
            } finally {
                btn.disabled = false;
                btn.textContent = 'Execute';
            }
        });
    </script>
</body>
</html>
